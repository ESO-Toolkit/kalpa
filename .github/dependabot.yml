version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 10
    ignore:
      # TypeScript 7 (native compiler) drops the ts.Extension enum that
      # @typescript-eslint/typescript-estree reads at module load, so every
      # eslint run crashes ("reading 'Cjs'") — bisect-verified in #267, which
      # held typescript at 6.x. typescript-eslint caps its peer range at
      # <6.1.0 with no TS 7 support even in canary. Drop this rule when
      # typescript-eslint ships TS 7 support (check
      # `npm view typescript-eslint@latest peerDependencies`). Minor/patch
      # typescript updates stay enabled. The worker is NOT ignored — it has
      # no typescript-eslint and already runs TS 7 (#262).
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /backend/eso-packs-worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # windows + webview2-com must stay in lockstep with the copies tauri/wry
      # pull transitively (see the comment in src-tauri/Cargo.toml). A minor
      # bump ahead of tauri/wry splits windows-core into two versions and the
      # WebView2 COM casts in lib.rs stop compiling (E0599) — verified against
      # 0.62/0.39 while tauri 2.11.5 / wry 0.55.1 still require ^0.61/^0.38.
      # Bump both manually when tauri/wry move. Patch updates stay enabled.
      - dependency-name: windows
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: webview2-com
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
