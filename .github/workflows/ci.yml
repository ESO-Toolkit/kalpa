name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      # --legacy-peer-deps: typescript-eslint 8.x doesn't yet support TypeScript 6
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      # Audit production dependencies only. The high-severity advisories that
      # otherwise fire here are all in dev/build tooling that never ships in the
      # desktop client (undici←jsdom for Vitest's DOM, hono←shadcn CLI), with no
      # upstream fix to bump to. --omit=dev still catches anything that would
      # actually run in the shipped app. Mirrors the Worker audit step below.
      - name: npm audit
        # --omit=dev mirrors the worker audit step: high-severity advisories in
        # dev-only tooling (jsdom→undici, shadcn→hono/js-yaml) don't ship in the
        # app, so audit production deps only.
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/

      - name: Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: Rust format check
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      # RUSTSEC-2026-0194 / -0195 (quick-xml quadratic-runtime DoS on duplicate
      # attribute names, fixed in quick-xml >=0.41.0) are transitive advisories
      # with no available non-breaking fix: quick-xml <0.41 is pinned by plist
      # (via tauri-utils / tauri 2.11) and by tauri-winrt-notification (via
      # tauri-plugin-notification -> notify-rust), neither of which yet accepts
      # quick-xml 0.41. The desktop client never parses untrusted XML through
      # these paths (build-time plist + Windows toast notifications), so ignore
      # until the upstream tauri crates bump quick-xml. Mirrors the npm audit
      # dev-only suppressions above.
      - name: Rust dependency audit
        run: |
          cargo install cargo-audit@0.22.1 --quiet --locked
          cargo audit --file src-tauri/Cargo.lock --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

      - name: Install worker dependencies
        run: npm ci
        working-directory: backend/eso-packs-worker

      # --omit=dev: the worker's only high-severity advisories are in dev/test
      # tooling (esbuild, via @cloudflare/vitest-pool-workers and wrangler),
      # which never ships to Cloudflare. Even the latest Cloudflare tooling
      # still pins the flagged esbuild, so there is no upstream fix to bump to.
      # Auditing production dependencies still catches anything that would
      # actually run in the deployed worker.
      - name: Worker npm audit
        run: npm audit --omit=dev --audit-level=high
        working-directory: backend/eso-packs-worker

      - name: Worker TypeScript check
        run: npx tsc --noEmit
        working-directory: backend/eso-packs-worker

      - name: Worker unit tests
        run: npx vitest run
        working-directory: backend/eso-packs-worker

      - name: Frontend unit tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri
        run: cargo build --manifest-path src-tauri/Cargo.toml
