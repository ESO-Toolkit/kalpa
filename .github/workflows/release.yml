name: Build & Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          # arm64 runner; --target universal-apple-darwin cross-compiles the
          # x86_64 half so one binary serves Intel Macs (ESO's Mac client is
          # Intel-only) and Apple Silicon.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # ubuntu-22.04 pins the compatibility baseline (WebKitGTK 4.1,
          # glibc 2.35). TODO: migrate to ubuntu-24.04 before the 22.04 runner
          # image is retired in April 2027 (raises the glibc baseline to 2.39).
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: "1.94.0"
          # Both halves of the universal macOS binary; harmless elsewhere.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev \
            build-essential curl wget file

      # --legacy-peer-deps: typescript-eslint 8.x doesn't yet support TypeScript 6
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization. All optional: tauri-action skips
          # signing while these secrets are unset, so unsigned beta builds ship
          # today and signing/notarization activate the moment an Apple
          # Developer ID certificate is added to the repo secrets.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          args: ${{ matrix.args }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/ESO-Toolkit/kalpa/blob/main/CHANGELOG.md) for full details.

            ## Install

            **Windows** (stable): download the `.exe` installer and run it. Requires Windows 10 (1803+) or Windows 11; WebView2 is pre-installed on Windows 11 and bootstrapped automatically on Windows 10.

            **macOS** (beta): download the `.dmg` (universal — Intel & Apple Silicon, macOS 10.15+). These builds are not yet notarized with Apple, so on first launch **right-click the app → Open → Open**. If macOS still reports the app as damaged, clear the quarantine flag: `xattr -dr com.apple.quarantine /Applications/Kalpa.app`

            **Linux** (beta): the `.AppImage` is recommended (`chmod +x` and run — it self-updates like the Windows build). `.deb` and `.rpm` packages are also provided but do **not** self-update; install new versions from this page. ESO under Steam Proton is detected automatically, including Flatpak Steam and secondary Steam libraries.

            Kalpa auto-updates when future releases are published (all platforms except `.deb`/`.rpm` installs).

            ## Verify your download
            Each release ships the installer alongside a `.sig` (auto-updater signature) and `latest.json`. See [Verify your download](https://github.com/ESO-Toolkit/kalpa/blob/main/docs/verify-download.md) for how to check the integrity of the file you downloaded.

            ## Known issues
            None known — please report anything you hit.

            ---

            🐛 **Found a bug or have feedback?** Use the [Beta Feedback template](https://github.com/ESO-Toolkit/kalpa/issues/new?template=beta_feedback.md) so it's tagged `beta` for triage. Security issues: see [SECURITY.md](https://github.com/ESO-Toolkit/kalpa/blob/main/SECURITY.md).
          # Draft while the multi-platform pipeline is new: inspect the artifact
          # set (exe/dmg/AppImage/deb/rpm + .sig + merged latest.json) before
          # publishing. Flip back to false once a cross-platform release has
          # shipped cleanly.
          releaseDraft: true
          prerelease: false
