name = "kalpa-pack-hub"
main = "src/index.ts"
compatibility_date = "2025-09-15"
# Set CLOUDFLARE_ACCOUNT_ID env var or run `wrangler whoami` to configure.
# account_id = ""

[[kv_namespaces]]
binding = "ESO_PACKS"
id = "ad8677b4cef048d68de9f8f4d0ef74a9"

# Secrets are set via `wrangler secret put ADMIN_API_KEY`.
# For local dev, create a .dev.vars file (git-ignored):
#   ADMIN_API_KEY=dev-secret-key

# Daily backup of pack index (midnight UTC)
[triggers]
crons = ["0 0 * * *"]

# Service binding — syncs pack mutations to roster-hub-api's D1 database
# so esotk.com reflects the latest pack data.
[[services]]
binding = "ROSTER_HUB"
service = "roster-hub-api"
entrypoint = "PackSyncService"

[observability]
enabled = true
